name: Bug report
description: Report a reproducible StreamPlayer problem.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve StreamPlayer.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: StreamPlayer version
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
    validations:
      required: true
