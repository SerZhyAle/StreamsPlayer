name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v26.0719.0131'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Resolve tag and version
        id: version
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace '^refs/tags/','' } else { '${{ inputs.tag }}' }
          if ($tag -notmatch '^v\d{2}\.\d{4}\.\d{4}$') { throw "Tag '$tag' must use vYY.MMDD.HHmm." }
          $version = $tag -replace '^v',''
          [DateTime]::ParseExact($version, 'yy.MMdd.HHmm', [Globalization.CultureInfo]::InvariantCulture) | Out-Null
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append
      - name: Restore, build and test
        run: |
          dotnet restore StreamsPlayer.sln
          dotnet build StreamsPlayer.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.version }}
          dotnet test StreamsPlayer.sln -c Release --no-build
      - name: Publish portable package
        run: |
          dotnet publish src/StreamsPlayer.App/StreamsPlayer.App.csproj -c Release -r win-x64 --self-contained true -p:Version=${{ steps.version.outputs.version }} -p:AssemblyVersion=${{ steps.version.outputs.version }} -p:FileVersion=${{ steps.version.outputs.version }} -p:InformationalVersion=${{ steps.version.outputs.version }} -o stage/StreamsPlayer
          Copy-Item README.md, LICENSE stage/StreamsPlayer
          New-Item -ItemType Directory dist -Force | Out-Null
          $name = "StreamsPlayer-${{ steps.version.outputs.version }}-windows-x64.zip"
          Compress-Archive -Path stage/StreamsPlayer/* -DestinationPath "dist/$name" -Force
          $hash = (Get-FileHash "dist/$name" -Algorithm SHA256).Hash
          "$hash  $name" | Out-File "dist/$name.sha256" -Encoding ascii
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StreamsPlayer ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256
