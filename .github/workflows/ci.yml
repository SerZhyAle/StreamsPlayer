name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.sln') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore StreamsPlayer.sln
      - name: Build
        run: dotnet build StreamsPlayer.sln -c Release --no-restore
      - name: Test
        run: dotnet test StreamsPlayer.sln -c Release --no-build --verbosity normal
